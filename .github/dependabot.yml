version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    versioning-strategy: increase

  - package-ecosystem: pip
    directory: "/.github/skills/heic-image-convert"
    schedule:
      interval: monthly
      day: first
    open-pull-requests-limit: 5
    versioning-strategy: increase

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10

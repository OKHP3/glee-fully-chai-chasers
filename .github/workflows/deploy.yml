name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Privacy gate — no private assets may exist in the tree
        run: |
          if [ -d reference-photos ] || [ -d private-work ]; then
            echo "::error::Private folders present in the committed tree. Aborting."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Brand-string gate — shipped bundle must be clean
        run: |
          if grep -riE "starbucks|tazo|swig ?life|orijen|cat man doo|moolah|sciplay|jackpot party" dist/; then
            echo "::error::Brand string found in shipped bundle. See docs/IP-GUARDRAILS.md"
            exit 1
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
